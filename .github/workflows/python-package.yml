# CI workflow for stash-graphql-client
# Runs linting with Ruff and tests with pytest using Poetry

name: Python Package

on:
  push:
    branches: ["**"]  # Run on all branch pushes
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ runner.arch }}-py3.12-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ runner.arch }}-py3.12-

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Lint with Ruff
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

  test-self-hosted:
    runs-on: [self-hosted, Linux, ARM64]
    needs: lint
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      stash:
        image: stashapp/stash:development
        ports:
          - 9999:9999
        env:
          STASH_STASH: /data/
          STASH_GENERATED: /generated/
          STASH_METADATA: /metadata/
          STASH_CACHE: /cache/
          STASH_PORT: 9999
        volumes:
          - /etc/localtime:/etc/localtime:ro
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/config:/root/.stash
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/data:/data
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/generated:/generated
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/metadata:/metadata
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/cache:/cache

    steps:
      - name: Cleanup stale Stash temp dirs from previous runs
        run: |
          sudo find /tmp -maxdepth 1 -name 'stash-*' -not -name 'stash-${{ github.run_id }}-*' -mmin +60 -exec rm -rf {} + 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: Clean up leftover Python installations
        run: |
          # Remove leftover pipx installations from previous runs
          rm -rf ${{ runner.temp }}/pipx || true
        continue-on-error: true

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry via pipx
        run: |
          # Use explicit Python path from setup-python to avoid PATH pollution
          ${{ steps.setup-python.outputs.python-path }} -m pip install --user pipx
          ${{ steps.setup-python.outputs.python-path }} -m pipx ensurepath
          ${{ steps.setup-python.outputs.python-path }} -m pipx install poetry
        env:
          PIPX_HOME: ${{ runner.temp }}/pipx
          PIPX_BIN_DIR: ${{ runner.temp }}/pipx/bin

      - name: Add Poetry to PATH
        run: echo "${{ runner.temp }}/pipx/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Wait for Stash to be ready
        run: |
          echo "Waiting for Stash GraphQL endpoint..."
          for i in {1..30}; do
            if curl -sf http://localhost:9999/graphql -H "Content-Type: application/json" -d '{"query": "{ version { build_time } }"}' > /dev/null 2>&1; then
              echo "✓ Stash is ready!"
              break
            fi
            echo "Attempt $i/30: Stash not ready yet, waiting..."
            sleep 2
          done

      - name: Initialize Stash if needed
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, time, sys

          GRAPHQL_URL = "http://localhost:9999/graphql"

          def graphql(query, variables=None):
              payload = {"query": query}
              if variables:
                  payload["variables"] = variables
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  GRAPHQL_URL, data=data,
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req, timeout=15) as resp:
                  return json.loads(resp.read())

          result = graphql("{ systemStatus { status } }")
          status = result["data"]["systemStatus"]["status"]
          print(f"Stash system status: {status}")

          if status == "SETUP":
              print("Running initial Stash setup...")
              setup = graphql(
                  "mutation Setup($input: SetupInput!) { setup(input: $input) }",
                  {"input": {
                      "configLocation": "",
                      "stashes": [],
                      "databaseFile": "",
                      "generatedLocation": "",
                      "cacheLocation": "",
                      "storeBlobsInDatabase": True,
                      "blobsLocation": "",
                  }}
              )
              print(f"Setup result: {setup}")
              if setup.get("data", {}).get("setup") is True:
                  print("Setup completed, waiting for initialization...")
                  time.sleep(5)
              else:
                  print("Setup failed!", file=sys.stderr)
                  sys.exit(1)
          else:
              print(f"Stash already configured (status: {status})")
          PYEOF

          # Stash probes an external host after setup; if reachable it sets
          # security_tripwire_accessed_from_public_internet to the detected IP
          # and blocks all unauthenticated requests. Fix: set
          # dangerous_allow_public_without_auth: true and blank the tripwire key.
          # Exit code 1 signals that a restart is needed to re-read the config.
          python3 - << 'PYEOF'
          import pathlib, re, sys

          config = pathlib.Path("/tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/config/config.yml")
          if not config.exists():
              sys.exit(0)

          content = config.read_text()
          patched = content

          if "dangerous_allow_public_without_auth" not in patched:
              patched += "dangerous_allow_public_without_auth: true\n"

          patched = re.sub(
              r"^security_tripwire_accessed_from_public_internet:.*$",
              'security_tripwire_accessed_from_public_internet: ""',
              patched, flags=re.MULTILINE,
          )

          if patched != content:
              config.write_text(patched)
              print("Patched config: dangerous_allow_public_without_auth + blanked tripwire")
              sys.exit(1)
          PYEOF
          PATCH_EXIT=$?

          if [ $PATCH_EXIT -ne 0 ]; then
            CONTAINER=$(docker ps -q --filter ancestor=stashapp/stash:development)
            if [ -n "$CONTAINER" ]; then
              echo "Restarting Stash to apply config changes..."
              docker restart "$CONTAINER"
              for i in {1..30}; do
                if curl -sf http://localhost:9999/graphql -H "Content-Type: application/json" \
                    -d '{"query": "{ version { build_time } }"}' > /dev/null 2>&1; then
                  echo "✓ Stash restarted and ready"
                  break
                fi
                sleep 2
              done
            fi
          fi

      - name: Run tests with pytest
        run: |
          poetry run pytest --cov=. --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy -n auto
        env:
          STASH_URL: http://localhost:9999/graphql

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./junit.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Cleanup Stash temp dirs
        if: always()
        run: sudo rm -rf /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}

  test-fallback:
    runs-on: ubuntu-latest
    needs: [lint, test-self-hosted]
    if: ${{ failure() || cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      stash:
        image: stashapp/stash:development
        ports:
          - 9999:9999
        env:
          STASH_STASH: /data/
          STASH_GENERATED: /generated/
          STASH_METADATA: /metadata/
          STASH_CACHE: /cache/
          STASH_PORT: 9999
        volumes:
          - /etc/localtime:/etc/localtime:ro
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/config:/root/.stash
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/data:/data
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/generated:/generated
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/metadata:/metadata
          - /tmp/stash-${{ github.run_id }}-py${{ matrix.python-version }}/cache:/cache

    steps:
      - uses: actions/checkout@v6

      - name: Clean up leftover Python installations
        run: |
          # Remove leftover pipx installations from previous runs
          rm -rf ${{ runner.temp }}/pipx || true
        continue-on-error: true

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry via pipx
        run: |
          # Use explicit Python path from setup-python to avoid PATH pollution
          ${{ steps.setup-python.outputs.python-path }} -m pip install --user pipx
          ${{ steps.setup-python.outputs.python-path }} -m pipx ensurepath
          ${{ steps.setup-python.outputs.python-path }} -m pipx install poetry
        env:
          PIPX_HOME: ${{ runner.temp }}/pipx
          PIPX_BIN_DIR: ${{ runner.temp }}/pipx/bin

      - name: Add Poetry to PATH
        run: echo "${{ runner.temp }}/pipx/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
